<!DOCTYPE html>
<html>
<head>
    <title>Stock AI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: #fff;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            width: 240px;
            height: 100vh;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar h4 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .sidebar p {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            margin: 18px 0;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            color: white;
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main {
            margin-left: 240px;
            padding: 40px;
            min-height: 100vh;
        }

        /* ===== GLASS CARD ===== */
        .glass {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        /* ===== CARD UI ===== */
        .card-ui {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            transition: 0.3s;
        }

        .card-ui:hover {
            transform: translateY(-3px);
        }

        /* ===== KPI ===== */
        .kpi {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .kpi:hover {
            transform: scale(1.03);
        }

        .kpi h3 {
            margin-top: 10px;
            font-weight: 600;
        }

        .kpi.final {
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
        }

        /* ===== INPUT ===== */
        .input-box {
            display:flex;
            gap:10px;
        }

        .input-box input {
            flex:1;
            padding:12px;
            border-radius:10px;
            border:none;
            outline:none;
            background: rgba(255,255,255,0.9);
            color: black;
        }

        .btn-main {
            background:#6366f1;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            color:white;
            transition: 0.3s;
        }

        .btn-main:hover {
            background:#4f46e5;
        }

        /* ===== GET STARTED BUTTON ===== */
        .btn-custom {
            color: white !important;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            font-weight: 500;
        }

        .btn-custom:hover {
            color: #60a5fa !important;
            border-color: #60a5fa;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }

        /* ===== CHART ===== */
        canvas {
            height: 260px !important;
        }

    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h4>📊 Stock AI</h4>

        {% if session.get('user') %}
            <p>👤 {{ session.get('user') }}</p>
        {% else %}
            <p>Welcome Guest</p>
        {% endif %}

        <!-- Dashboard -->
        <a href="{{ '/index' if session.get('user') else '/signin' }}">
            🏠 Dashboard
        </a>

        <!-- Static Pages -->
        <a href="/about">ℹ️ About</a>
        <a href="/notebook">📘 Notebook</a>

        <!-- Auth -->
        {% if session.get('user') %}
            <a href="/logout">🚪 Logout</a>
        {% else %}
            <a href="/signin">🔑 Login</a>
        {% endif %}

    </div>

    <!-- MAIN -->
    <div class="main">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
